# pytest.ini — test configuration for weld_vision

[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Custom markers
markers =
    unit:        Fast unit tests (no I/O, < 1s each)
    accuracy:    Numerical accuracy tests against ground truth
    integration: End-to-end pipeline and batch tests
    slow:        Tests that take > 5s (skipped in --fast mode)

# Minimum test coverage threshold (requires pytest-cov)
addopts =
    --strict-markers
    --tb=short

# Fail fast — stop on first failure during watch mode
# (override with pytest -p no:randomly for reproducible order)
